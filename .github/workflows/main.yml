name: ci

on:
  push:
    branches:
      - main
      - dev
      - fix/*
      - feat/*
    paths:
      - app/**.
      - packages/**
  pull_request:
    branches:
    - main

jobs:
  setup:
    name: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Lint
        run: pnpm turbo lint

      - name: Build
        run: pnpm turbo build

        # put in image
  
  #testing
  
